services:
  api:
    build:
      context: .
      dockerfile: lab_1/Dockerfile
    depends_on:
      redis:
        condition: service_started
      mongo-setup:
        condition: service_completed_successfully
    env_file:
      - .env.local
    ports:
      - "${APP_PORT}:${APP_PORT}"

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT}:${REDIS_PORT}"

  mongo-cfg-1:
    image: mongo:7
    command: ["mongod", "--port", "${MONGODB_PORT}", "--bind_ip_all"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
    volumes:
      - mongo_cfg_1:/data/configdb

  mongo-cfg-2:
    image: mongo:7
    command: ["mongod", "--configsvr", "--replSet", "cfgrepl", "--port", "27017", "--bind_ip_all"]
    volumes:
      - mongo_cfg_2:/data/configdb

  mongo-cfg-3:
    image: mongo:7
    command: ["mongod", "--configsvr", "--replSet", "cfgrepl", "--port", "27017", "--bind_ip_all"]
    volumes:
      - mongo_cfg_3:/data/configdb

  mongo-shard-1:
    image: mongo:7
    command: ["mongod", "--shardsvr", "--replSet", "shardrepl", "--port", "27017", "--bind_ip_all"]
    volumes:
      - mongo_s1:/data/db

  mongo-shard-2:
    image: mongo:7
    command: ["mongod", "--shardsvr", "--replSet", "shardrepl", "--port", "27017", "--bind_ip_all"]
    volumes:
      - mongo_s2:/data/db

  mongo-shard-3:
    image: mongo:7
    command: ["mongod", "--shardsvr", "--replSet", "shardrepl", "--port", "27017", "--bind_ip_all"]
    volumes:
      - mongo_s3:/data/db

  mongos:
    image: mongo:7
    command:
      [
        "mongos",
        "--configdb",
        "cfgrepl/mongo-cfg-1:27017,mongo-cfg-2:27017,mongo-cfg-3:27017",
        "--bind_ip_all",
        "--port",
        "27017",
      ]
    depends_on:
      - mongo-cfg-1
      - mongo-cfg-2
      - mongo-cfg-3
      - mongo-shard-1
      - mongo-shard-2
      - mongo-shard-3
    ports:
      - "${MONGODB_PORT}:${MONGODB_PORT}"
    restart: unless-stopped

  mongo-setup:
    image: mongo:7
    depends_on:
      - mongos
      - mongo-cfg-1
      - mongo-cfg-2
      - mongo-cfg-3
      - mongo-shard-1
      - mongo-shard-2
      - mongo-shard-3
    volumes:
      - ./sharding-init/setup.sh:/setup.sh:ro
    entrypoint: ["/bin/bash", "/setup.sh"]
    restart: "no"

volumes:
  mongo_cfg_1:
  mongo_cfg_2:
  mongo_cfg_3:
  mongo_s1:
  mongo_s2:
  mongo_s3:
