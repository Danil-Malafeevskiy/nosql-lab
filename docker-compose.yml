version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: lab_1/Dockerfile
    depends_on:
      - redis
      - mongo
    env_file:
      - .env.local
    ports:
      - "${APP_PORT}:${APP_PORT}"

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT}:${REDIS_PORT}"

  mongo:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
    volumes:
      - ./mongo-init:/docker-entrypoint-initdb.d:ro
    ports:
      # Autograder expects MongoDB on localhost:27017.
      # Host port can be overridden locally via MONGODB_HOST_PORT.
      - "${MONGODB_HOST_PORT:-27017}:27017"
