services:
  api:
    build:
      context: .
      dockerfile: lab_1/Dockerfile
    depends_on:
      redis:
        condition: service_started
      neo4j:
        condition: service_started
      cassandra-setup:
        condition: service_completed_successfully
      mongo-setup:
        condition: service_completed_successfully
    env_file:
      - .env.local
    ports:
      - "${APP_PORT}:${APP_PORT}"

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT}:${REDIS_PORT}"

  neo4j:
    image: neo4j:5
    env_file:
      - .env.local
    environment:
      - NEO4J_AUTH=${NEO4J_USERNAME}/${NEO4J_PASSWORD}
      - NEO4J_server_bolt_listen__address=0.0.0.0:${NEO4J_BOLT_PORT}
      - NEO4J_server_bolt_advertised__address=neo4j:${NEO4J_BOLT_PORT}
    ports:
      - "${NEO4J_BOLT_PORT}:${NEO4J_BOLT_PORT}"

  cassandra-test:
    image: cassandra:5
    ports:
      - "${CASSANDRA_PORT}:${CASSANDRA_PORT}"

  cassandra-setup:
    image: cassandra:5
    depends_on:
      cassandra-test:
        condition: service_started
    env_file:
      - .env.local
    volumes:
      - ./cassandra-init/setup.sh:/setup.sh:ro
      - ./cassandra-init/init.cql:/init.cql:ro
    entrypoint: ["/bin/bash", "/setup.sh"]
    restart: "no"

  mongo-cfg-1:
    image: mongo:7
    command: ["mongod", "--configsvr", "--replSet", "cfgrepl", "--port", "${MONGODB_PORT}", "--bind_ip_all"]
    volumes:
      - mongo_cfg_1:/data/configdb

  mongo-cfg-2:
    image: mongo:7
    command: ["mongod", "--configsvr", "--replSet", "cfgrepl", "--port", "${MONGODB_PORT}", "--bind_ip_all"]
    volumes:
      - mongo_cfg_2:/data/configdb

  mongo-cfg-3:
    image: mongo:7
    command: ["mongod", "--configsvr", "--replSet", "cfgrepl", "--port", "${MONGODB_PORT}", "--bind_ip_all"]
    volumes:
      - mongo_cfg_3:/data/configdb

  mongo-shard-1:
    image: mongo:7
    command: ["mongod", "--shardsvr", "--replSet", "shardrepl", "--port", "${MONGODB_PORT}", "--bind_ip_all"]
    volumes:
      - mongo_s1:/data/db

  mongo-shard-2:
    image: mongo:7
    command: ["mongod", "--shardsvr", "--replSet", "shardrepl", "--port", "${MONGODB_PORT}", "--bind_ip_all"]
    volumes:
      - mongo_s2:/data/db

  mongo-shard-3:
    image: mongo:7
    command: ["mongod", "--shardsvr", "--replSet", "shardrepl", "--port", "${MONGODB_PORT}", "--bind_ip_all"]
    volumes:
      - mongo_s3:/data/db

  mongo-shard2-1:
    image: mongo:7
    command: ["mongod", "--shardsvr", "--replSet", "shardrepl2", "--port", "${MONGODB_PORT}", "--bind_ip_all"]
    volumes:
      - mongo_s2b_1:/data/db

  mongo-shard2-2:
    image: mongo:7
    command: ["mongod", "--shardsvr", "--replSet", "shardrepl2", "--port", "${MONGODB_PORT}", "--bind_ip_all"]
    volumes:
      - mongo_s2b_2:/data/db

  mongo-shard2-3:
    image: mongo:7
    command: ["mongod", "--shardsvr", "--replSet", "shardrepl2", "--port", "${MONGODB_PORT}", "--bind_ip_all"]
    volumes:
      - mongo_s2b_3:/data/db

  mongos:
    image: mongo:7
    command:
      [
        "mongos",
        "--configdb",
        "cfgrepl/mongo-cfg-1:${MONGODB_PORT},mongo-cfg-2:${MONGODB_PORT},mongo-cfg-3:${MONGODB_PORT}",
        "--bind_ip_all",
        "--port",
        "${MONGODB_PORT}",
      ]
    depends_on:
      - mongo-cfg-1
      - mongo-cfg-2
      - mongo-cfg-3
      - mongo-shard-1
      - mongo-shard-2
      - mongo-shard-3
      - mongo-shard2-1
      - mongo-shard2-2
      - mongo-shard2-3
    ports:
      - "${MONGODB_PORT}:${MONGODB_PORT}"
    restart: unless-stopped

  mongo-setup:
    image: mongo:7
    depends_on:
      - mongos
      - mongo-cfg-1
      - mongo-cfg-2
      - mongo-cfg-3
      - mongo-shard-1
      - mongo-shard-2
      - mongo-shard-3
      - mongo-shard2-1
      - mongo-shard2-2
      - mongo-shard2-3
    env_file:
      - .env.local
    volumes:
      - ./sharding-init/setup.sh:/setup.sh:ro
    entrypoint: ["/bin/bash", "/setup.sh"]
    restart: "no"

volumes:
  mongo_cfg_1:
  mongo_cfg_2:
  mongo_cfg_3:
  mongo_s1:
  mongo_s2:
  mongo_s3:
  mongo_s2b_1:
  mongo_s2b_2:
  mongo_s2b_3: